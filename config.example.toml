# Example configuration for local development.
# For production Docker deployments, set APP_ENV=production and mount real TLS, database, Redis, and R2 credentials.
app_env = "development"
app_base_url = "http://localhost:8080"
log_level = "debug"
encryption_master_key = "0123456789abcdef0123456789abcdef"
imap_plaintext_bind = "0.0.0.0:1143"
imap_tls_bind = "0.0.0.0:1993"
imap_tls_cert_path = "/certs/imap.crt"
imap_tls_key_path = "/certs/imap.key"
http_bind = "0.0.0.0:8080"
metrics_bind = "0.0.0.0:9090"
database_url = "postgres://imap_cache:imap_cache_password@127.0.0.1:5432/imap_cache"
redis_url = "redis://127.0.0.1:6379"
r2_endpoint = "http://127.0.0.1:9000"
r2_bucket = "imap-cache"
r2_access_key_id = "minioadmin"
r2_secret_access_key = "minioadmin"
r2_region = "auto"
object_store_path = "./data/blob"
search_index_path = "./data/search"
max_literal_size_bytes = 52428800
max_message_size_bytes = 104857600
default_account_quota_bytes = 10737418240
cache_eviction_keep_latest_objects = 0
sync_concurrency = 4
idle_timeout_seconds = 1740
upstream_connection_limit_per_account = 2
login_rate_limit_failures = 5
login_rate_limit_lockout_seconds = 60
